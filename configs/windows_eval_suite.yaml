scenarios: [clear_path, near_obstacle, far_obstacle, unknown_near_path, planner_disagreement, target_reachable, object_appears, object_disappears, object_moves, risk_increases]
seeds: [0]
max_steps: 10
risk_thresholds: [1.5]
near_miss_thresholds: [1.0]
collision_threshold: 0.2
apply_policies: [rast, object_list, flat_feature, scene_graph, event_aware_rast]
event_policy_variants: [full, logging_only, no_risk_changed]
update_modes: [full_recompute, incremental]
noise_settings: [{"position_noise_std": 0.0, "distance_noise_std": 0.0, "visibility_flip_prob": 0.0}, {"position_noise_std": 0.02, "distance_noise_std": 0.02, "visibility_flip_prob": 0.0}]
output_dir: runs/windows_eval_suite
